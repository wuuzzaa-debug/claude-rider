; Claude Rider Firmware
; ESP32-C3-MINI mit 25x WS2812 LEDs an GPIO5

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800

lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
