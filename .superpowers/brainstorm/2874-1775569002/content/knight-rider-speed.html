<h2>Classic KITT — Welche Geschwindigkeit?</h2>
<p class="subtitle">Klick auf die Variante die sich am besten anfuehlt.</p>

<div class="cards">
  <div class="card" data-choice="fast" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#111;padding:20px;border-radius:8px;">
      <canvas id="canvas-fast" width="500" height="60"></canvas>
    </div>
    <div class="card-body">
      <h3>A) Schnell</h3>
      <p>~1.5x Original. Zuegig, aufmerksam.</p>
    </div>
  </div>

  <div class="card" data-choice="faster" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#111;padding:20px;border-radius:8px;">
      <canvas id="canvas-faster" width="500" height="60"></canvas>
    </div>
    <div class="card-body">
      <h3>B) Flink</h3>
      <p>~2x Original. Energisch, "da wird gearbeitet".</p>
    </div>
  </div>

  <div class="card" data-choice="aggressive" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#111;padding:20px;border-radius:8px;">
      <canvas id="canvas-aggressive" width="500" height="60"></canvas>
    </div>
    <div class="card-body">
      <h3>C) Aggressiv</h3>
      <p>~3x Original. Hektisch, intensiv — wie KITT im Turbo Boost.</p>
    </div>
  </div>
</div>

<script>
const LEDS = 25;
const LED_W = 16;
const LED_GAP = 4;
const LED_H = 40;

function drawLEDs(ctx, brightness) {
  const totalW = LEDS * (LED_W + LED_GAP) - LED_GAP;
  const offsetX = (ctx.canvas.width - totalW) / 2;
  const offsetY = (ctx.canvas.height - LED_H) / 2;
  ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);

  for (let i = 0; i < LEDS; i++) {
    const x = offsetX + i * (LED_W + LED_GAP);
    const b = Math.max(0, Math.min(1, brightness[i]));

    if (b > 0.1) {
      const glow = ctx.createRadialGradient(
        x + LED_W/2, offsetY + LED_H/2, 2,
        x + LED_W/2, offsetY + LED_H/2, LED_W * 1.5
      );
      glow.addColorStop(0, `rgba(255, ${Math.floor(30*b)}, ${Math.floor(10*b)}, ${b * 0.4})`);
      glow.addColorStop(1, 'rgba(255, 0, 0, 0)');
      ctx.fillStyle = glow;
      ctx.fillRect(x - LED_W, offsetY - LED_H/2, LED_W * 3, LED_H * 2);
    }

    const r = Math.floor(255 * b);
    const g = Math.floor(20 * b);
    const bl = Math.floor(5 * b);
    ctx.fillStyle = b > 0.02 ? `rgb(${r},${g},${bl})` : '#1a1a1a';
    ctx.beginPath();
    ctx.roundRect(x, offsetY, LED_W, LED_H, 3);
    ctx.fill();

    if (b > 0.3) {
      ctx.fillStyle = `rgba(255, 150, 100, ${b * 0.3})`;
      ctx.beginPath();
      ctx.roundRect(x + 2, offsetY + 2, LED_W - 4, LED_H * 0.3, 2);
      ctx.fill();
    }
  }
}

function runKitt(canvasId, speed) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  let pos = 0, dir = 1;
  const tailLen = 8;

  function frame() {
    pos += speed * dir;
    if (pos >= LEDS - 1) { pos = LEDS - 1; dir = -1; }
    if (pos <= 0) { pos = 0; dir = 1; }

    const brightness = new Array(LEDS).fill(0);
    for (let i = 0; i < LEDS; i++) {
      const dist = Math.abs(i - pos);
      if (dist < 1) brightness[i] = 1.0 - dist * 0.3;
      else if (dist < tailLen) brightness[i] = Math.pow(1.0 - dist / tailLen, 2.5);
    }
    drawLEDs(ctx, brightness);
    requestAnimationFrame(frame);
  }
  frame();
}

runKitt('canvas-fast', 0.09);
runKitt('canvas-faster', 0.12);
runKitt('canvas-aggressive', 0.18);
</script>
